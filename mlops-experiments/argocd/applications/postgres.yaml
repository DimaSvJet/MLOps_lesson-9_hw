apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: mlflow-postgres
  namespace: infra-tools

spec:
  project: default

  source:
    repoURL: https://github.com/DimaSvJet/MLOps_lesson-9_hw.git
    targetRevision: master
    path: mlops-experiments/argocd/postgres

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
