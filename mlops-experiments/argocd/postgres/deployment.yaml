apiVersion: apps/v1
kind: Deployment

metadata:
  name: mlflow-postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mlflow-postgres

  template:
    metadata:
      labels:
        app: mlflow-postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15

          env:
            - name: POSTGRES_USER
              value: mlflow

            - name: POSTGRES_PASSWORD
              value: mlflow

            - name: POSTGRES_DB
              value: mlflow

          ports:
            - containerPort: 5432

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"

            limits:
              memory: "256Mi"
              cpu: "250m"
